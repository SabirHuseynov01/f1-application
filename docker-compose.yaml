services:

  # ================= INFRASTRUCTURE =================

  postgres:
    image: postgres:16-alpine
    container_name: f1_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: f1user
      POSTGRES_PASSWORD: f1pass
      POSTGRES_MULTIPLE_DATABASES: >
        f1_session_db,f1_timing_db,f1_telemetry_db,
        f1_replay_db,f1_user_db,f1_notification_db,f1_analytics_db
    ports:
      - "5433:5432"
    volumes:
      - f1_postgres_data:/var/lib/postgresql/data
      - ./init-multiple-databases.sh:/docker-entrypoint-initdb.d/init-multiple-databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U f1user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - f1_network

  redis:
    image: redis:7-alpine
    container_name: f1_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - f1_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - f1_network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: f1_zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - f1_network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: f1_kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - f1_network

  # ================= SERVICES =================

  session-service:
    build:
      context: ../session-service
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/f1_session_db
      SPRING_DATASOURCE_USERNAME: f1user
      SPRING_DATASOURCE_PASSWORD: f1pass
    depends_on:
      - postgres
    networks:
      - f1_network

  timing-service:
    build:
      context: ../timing-service
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/f1_timing_db
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      - postgres
      - kafka
    networks:
      - f1_network

  telemetry-service:
    build:
      context: ../telemetry-service
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/f1_telemetry_db
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SESSION_SERVICE_URL: http://session-service:8082
      TIMING_SERVICE_URL: http://timing-service:8083
    depends_on:
      - postgres
      - kafka
      - session-service
      - timing-service
    networks:
      - f1_network

  replay-service:
    build:
      context: ../replay-service
    ports:
      - "8085:8085"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/f1_replay_db
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      - postgres
      - kafka
    networks:
      - f1_network

  user-service:
    build:
      context: ../user-service
    ports:
      - "8086:8086"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/f1_user_db
      SPRING_DATASOURCE_USERNAME: f1user
      SPRING_DATASOURCE_PASSWORD: f1pass
    depends_on:
      - postgres
    networks:
      - f1_network

  notification-service:
    build:
      context: ../notification-service
    ports:
      - "8087:8087"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/f1_notification_db
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      - postgres
      - kafka
    networks:
      - f1_network

  analytics-service:
    build:
      context: ../analytics-service
    ports:
      - "8088:8088"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/f1_analytics_db
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      - postgres
      - kafka
    networks:
      - f1_network

  api-gateway:
    build:
      context: ../api-gateway
    ports:
      - "8080:8080"
    environment:
      SESSION_SERVICE_URL: http://session-service:8082
      TIMING_SERVICE_URL: http://timing-service:8083
      TELEMETRY_SERVICE_URL: http://telemetry-service:8084
      USER_SERVICE_URL: http://user-service:8086
      REPLAY_SERVICE_URL: http://replay-service:8085
    depends_on:
      - session-service
      - timing-service
      - telemetry-service
      - user-service
      - replay-service
    networks:
      - f1_network

volumes:
  f1_postgres_data:
  f1_redis_data:

networks:
  f1_network:
    driver: bridge