spring:
  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://localhost:5433/f1_user_db
    username: f1user
    password: f1pass
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8086

jwt:
  secret: ${JWT_SECRET:f1-platform-jwt-secret-key-2026-change-in-prod}
  expiration: 86400000

logging:
  level:
    com.example.f1userservice: DEBUG