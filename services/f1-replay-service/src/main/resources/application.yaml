spring:
  application:
    name: replay-service
  datasource:
    url: jdbc:postgresql://localhost:5433/f1_replay_db
    username: f1user
    password: f1pass
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

server:
  port: 8085

# Service URLs
session-service:
  url: ${SESSION_SERVICE_URL:http://localhost:8082}
timing-service:
  url: ${TIMING_SERVICE_URL:http://localhost:8083}
telemetry-service:
  url: ${TELEMETRY_SERVICE_URL:http://localhost:8084}

kafka:
  topics:
    replay-events: f1.replay.events
    replay-control: f1.replay.control

logging:
  level:
    com.example.f1replayservice: INFO