server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
      routes:
        - id: session-service
          uri: ${GATEWAY_ROUTE_SESSION_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/sessions/**, /api/v1/seasons/**, /api/v1/circuits/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 50
                redis-rate-limiter.burstCapacity: 100
                redis-rate-limiter.requestedTokens: 1
            - name: CircuitBreaker
              args:
                name: sessionServiceCircuitBreaker
                fallbackUri: forward:/fallback/session

        - id: timing-service
          uri: ${GATEWAY_ROUTE_TIMING_URL:http://localhost:8083}
          predicates:
            - Path=/api/timing/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 200
            - name: CircuitBreaker
              args:
                name: timingServiceCircuitBreaker
                fallbackUri: forward:/fallback/timing

        - id: telemetry-service
          uri: ${GATEWAY_ROUTE_TELEMETRY_URL:http://localhost:8084}
          predicates:
            - Path=/api/telemetry/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 50
                redis-rate-limiter.burstCapacity: 100

        - id: replay-service
          uri: ${GATEWAY_ROUTE_REPLAY_URL:http://localhost:8085}
          predicates:
            - Path=/api/replay/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 50

        - id: user-service
          uri: ${GATEWAY_ROUTE_USER_URL:http://localhost:8086}
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20

        - id: notification-service
          uri: ${GATEWAY_ROUTE_NOTIFICATION_URL:http://localhost:8087}
          predicates:
            - Path=/api/notifications/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 30
                redis-rate-limiter.burstCapacity: 60

        - id: analytics-service
          uri: ${GATEWAY_ROUTE_ANALYTICS_URL:http://localhost:8088}
          predicates:
            - Path=/api/analytics/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 30
                redis-rate-limiter.burstCapacity: 60

      default-filters:
        - name: Retry
          args:
            retries: 3
            statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE
            methods: GET,POST
            backoff:
              firstBackoff: 50ms
              maxBackoff: 500ms

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}

# JWT
jwt:
  secret: ${JWT_SECRET:f1-platform-jwt-secret-key-2026-change-in-prod}

# Resilience4j
resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
    instances:
      sessionServiceCircuitBreaker:
        baseConfig: default
      timingServiceCircuitBreaker:
        baseConfig: default

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,gateway
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: DEBUG